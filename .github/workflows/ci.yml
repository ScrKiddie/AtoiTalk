name: CI

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  validate:
    name: Validate and Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check Formatting (Prettier)
        run: pnpm exec prettier --check .

      - name: Lint (ESLint)
        run: pnpm run lint

      - name: Type Check (TSC)
        run: pnpm exec tsc --noEmit

      - name: Run Unit Tests
        run: pnpm run test

      - name: Build
        run: pnpm run build
